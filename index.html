<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pi Master - Infinite & Timed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&family=Inter:wght@400;700;800&display=swap');
        :root {
            --bg-color: #0d0d0d; --card-bg: rgba(26, 26, 26, 0.9);
            --accent-blue: #0070FF; --accent-green: #00FF00;
            --accent-red: #FF3B30; --accent-purple: #A020F0;
        }
        html, body { 
            position: fixed; height: 100%; width: 100%; margin: 0; padding: 0;
            background-color: var(--bg-color); font-family: 'Inter', sans-serif;
            overflow: hidden; touch-action: none; color: white;
            transition: background-color 0.3s ease;
        }
        #bgCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.6;
        }
        body.error-state { background-color: #2a0000; }
        .error-state .game-card { border-color: rgba(255, 59, 48, 0.5); box-shadow: 0 20px 50px rgba(255,0,0,0.2); }
        .error-state #feedback { color: var(--accent-red); font-size: 1.2rem; }
        #app-container {
            position: absolute; top: 15px; left: 50%;
            transform: translateX(-50%); width: 94%; max-width: 400px;
            display: flex; flex-direction: column; z-index: 100;
        }
        .game-card {
            background: var(--card-bg); padding: 20px; border-radius: 32px;
            border: 1px solid #333; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .mode-indicator { font-size: 0.7rem; font-weight: 800; color: #888; margin-bottom: 5px; letter-spacing: 2px; }
        .timer-display { font-family: 'Roboto Mono'; color: var(--accent-blue); font-size: 1.2rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 112, 255, 0.5); }
        .repeat-info {
            background: rgba(0, 112, 255, 0.1); color: var(--accent-blue);
            padding: 8px; border-radius: 12px; font-weight: 800; margin-bottom: 10px;
            font-size: 0.85rem; border: 1px solid rgba(0, 112, 255, 0.2);
        }
        .pi-target {
            font-family: 'Roboto Mono', monospace; font-size: 1.8rem; font-weight: 800;
            color: white; margin: 10px 0; letter-spacing: 1px; line-height: 1.2; min-height: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .input-display {
            font-family: 'Roboto Mono', monospace; font-size: 1.1rem; color: var(--accent-green);
            min-height: 35px; margin-bottom: 15px; letter-spacing: 2px;
            overflow-x: auto; white-space: nowrap; padding: 5px;
            scrollbar-width: none;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .input-display::-webkit-scrollbar { display: none; }
        .wrong-digits { color: var(--accent-red); font-weight: 800; opacity: 0; animation: fadeIn 0.3s forwards; text-shadow: 0 0 10px rgba(255, 59, 48, 0.7); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-blue); transition: width 0.3s ease; box-shadow: 0 0 10px rgba(0, 112, 255, 0.5); }
        .stats-row { display: flex; justify-content: space-around; border-top: 1px solid #333; padding-top: 10px; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1rem; font-weight: 800; display: block; }
        .mode-switch-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn-mode { flex: 1; padding: 12px; border: none; border-radius: 15px; font-weight: 800; color: white; cursor: pointer; font-size: 0.75rem; background: #222; transition: background 0.2s; }
        .btn-mode:hover { background: #333; }
        .active-mode { border: 2px solid white !important; background: #333; }
        #hiddenInput { position: absolute; top: -100px; opacity: 0; }
        #feedback { text-align:center; margin-top:10px; font-weight:800; min-height: 20px; font-size: 0.8rem; text-shadow: 0 0 10px currentColor; }
        
        #footer-text {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; color: #555; letter-spacing: 1px; z-index: 101; font-weight: 700;
        }
        #record-btn {
            position: fixed; bottom: 15px; right: 15px; width: 45px; height: 45px;
            background: #222; border: 1px solid #444; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 102; transition: all 0.3s;
        }
        #record-btn.recording { background: var(--accent-red); border-color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="app-container">
    <div class="game-card">
        <div class="mode-indicator" id="currentModeName">TRAINING MODE</div>
        <div class="timer-display" id="timer">00:00.00</div>
        <div class="pi-target" id="targetDigits">Loading Pi...</div>
        <div class="repeat-info" id="modeStatus">REPETITION: <span id="repeatCount">1</span> / 10</div>
        <div class="input-display" id="inputDisplay">_ _ _ _</div>
        <div class="progress-bar-container" id="progContainer"><div id="progress-bar"></div></div>
        <div class="stats-row">
            <div class="stat-item"><span class="stat-label">Inputted</span><span class="stat-value" id="totalDigit">0</span></div>
            <div class="stat-item"><span class="stat-label">Group</span><span class="stat-value" id="groupIndex">1</span></div>
        </div>
        <div class="mode-switch-row">
            <button class="btn-mode active-mode" id="btnTrain" onclick="switchMode('training')">TRAINING</button>
            <button class="btn-mode" id="btnFree" onclick="switchMode('free')">FREE MODE</button>
        </div>
    </div>
    <div id="feedback"></div>
</div>

<div id="footer-text">pi-play.vercel.app</div>

<button id="record-btn" onclick="toggleRecording()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
    </svg>
</button>

<input type="tel" id="hiddenInput" autocomplete="off">

<script>
    let PI_DATA = "";
    const CHUNKS = ["1415", "92", "6535", "8979", "3238", "46264", "33832", "7950", "2884", "1971", "69", "3993", "751", "05820", "974", "9445", "923", "078", "1640", "62862", "08998", "6280", "3482534", "21170", "679", "82148", "08651", "32823", "066470", "938", "446", "0955", "058", "2231", "72535", "94", "0812", "848", "111", "745", "0284", "102701", "93", "852", "110", "555", "96446", "229", "489", "549", "3038"];
    const DISPLAY_CHUNKS = ["1415", "92", "6535", "8979", "3238", "46 2 64", "33 8 32", "7950", "2884", "1971", "69", "3993", "751", "05820", "974", "9445", "923", "078", "1640", "62 8 62", "0 8998", "6280", "34 825 34", "21170", "679", "8 214 8", "0865 1", "32 8 23", "0 6647 0", "938", "446", "0955", "058", "2231", "7 2535", "94", "0812", "848", "111", "745", "0284", "10 27 01", "93", "852", "110", "555", "9 6446", "229", "489", "549", "3038"];

    let currentMode = 'training';
    let currentChunkIdx = 0;
    let currentInput = "";
    let repeatsDone = 0;
    let isReviewingAll = false;
    let totalDigitsPassed = 0;
    let startTime, timerInterval;
    let isGameOver = false;

    let mediaRecorder;
    let recordedChunks = [];

    async function fetchPi() {
        try {
            const response = await fetch('https://api.pi.delivery/v1/pi?start=0&numberOfDigits=2000');
            const data = await response.json();
            PI_DATA = data.content;
            updateUI();
        } catch (e) {
            PI_DATA = "14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038";
            updateUI();
        }
    }

    function startTimer() {
        if (timerInterval || isGameOver) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - startTime;
            let m = Math.floor(diff / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            let ms = Math.floor((diff % 1000) / 10);
            document.getElementById('timer').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }, 50);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function triggerFreeModeError() {
        isGameOver = true;
        stopTimer();
        document.body.classList.add('error-state');
        document.getElementById('feedback').innerText = "KAMU SALAH!";
        document.getElementById('hiddenInput').disabled = true;
        const displayEl = document.getElementById('inputDisplay');
        let nextDigits = PI_DATA.substr(totalDigitsPassed, 5).split('');
        let i = 0;
        let interval = setInterval(() => {
            if (i < nextDigits.length) {
                const span = document.createElement('span');
                span.className = 'wrong-digits';
                span.innerText = nextDigits[i] + " ";
                displayEl.appendChild(span);
                displayEl.scrollLeft = displayEl.scrollWidth;
                i++;
            } else {
                clearInterval(interval);
            }
        }, 300);
    }

    function switchMode(m) {
        currentMode = m;
        document.getElementById('currentModeName').innerText = m.toUpperCase() + " MODE";
        document.getElementById('btnTrain').classList.toggle('active-mode', m === 'training');
        document.getElementById('btnFree').classList.toggle('active-mode', m === 'free');
        document.getElementById('modeStatus').style.display = m === 'training' ? 'block' : 'none';
        document.getElementById('progContainer').style.display = m === 'training' ? 'block' : 'none';
        resetGame();
    }

    function updateUI() {
        if (!PI_DATA || isGameOver) return;
        const displayEl = document.getElementById('inputDisplay');
        if (currentMode === 'training') {
            let chunkTotalLen = 0;
            for(let i=0; i<=currentChunkIdx; i++) chunkTotalLen += CHUNKS[i].length;
            document.getElementById('targetDigits').innerText = isReviewingAll ? "REVIEW PREVIOUS" : DISPLAY_CHUNKS[currentChunkIdx];
            document.getElementById('repeatCount').innerText = repeatsDone + 1;
            let displayStr = "";
            const cleanTarget = isReviewingAll ? PI_DATA.substr(0, chunkTotalLen) : CHUNKS[currentChunkIdx];
            for(let i=0; i<cleanTarget.length; i++) displayStr += (currentInput[i] || "_") + " ";
            displayEl.innerText = displayStr;
            document.getElementById('progress-bar').style.width = (repeatsDone / 10 * 100) + "%";
            document.getElementById('groupIndex').innerText = currentChunkIdx + 1;
        } else {
            document.getElementById('targetDigits').innerText = "Type Infinite Pi";
            let displayStr = "";
            for(let i=0; i<currentInput.length; i++) displayStr += currentInput[i] + " ";
            displayStr += "_ "; 
            displayEl.innerText = displayStr;
            document.getElementById('groupIndex').innerText = "∞";
        }
        document.getElementById('totalDigit').innerText = totalDigitsPassed;
        displayEl.scrollLeft = displayEl.scrollWidth;
    }

    document.getElementById('hiddenInput').addEventListener('input', (e) => {
        if (isGameOver) return;
        const char = e.target.value.slice(-1);
        e.target.value = "";
        if (!char || isNaN(char)) return;
        startTimer();
        if (currentMode === 'training') {
            let chunkTotalLen = 0;
            for(let i=0; i<=currentChunkIdx; i++) chunkTotalLen += CHUNKS[i].length;
            let targetText = isReviewingAll ? PI_DATA.substr(0, chunkTotalLen) : CHUNKS[currentChunkIdx];
            if (char === targetText[currentInput.length]) {
                currentInput += char;
                document.getElementById('feedback').innerText = "";
                if (currentInput.length === targetText.length) {
                    repeatsDone++;
                    currentInput = "";
                    stopTimer();
                    if (repeatsDone === 10) {
                        repeatsDone = 0;
                        if (!isReviewingAll && currentChunkIdx > 0) {
                            isReviewingAll = true;
                            document.getElementById('feedback').innerText = "ACCUMULATIVE REVIEW!";
                        } else {
                            totalDigitsPassed = chunkTotalLen;
                            currentChunkIdx++;
                            isReviewingAll = false;
                            document.getElementById('feedback').innerText = "NEW GROUP";
                        }
                    }
                }
            } else {
                document.getElementById('feedback').innerText = "WRONG! RESTART REPETITION";
                currentInput = "";
                repeatsDone = 0;
                stopTimer();
            }
        } else {
            if (char === PI_DATA[totalDigitsPassed]) {
                currentInput += char;
                totalDigitsPassed++;
                document.getElementById('feedback').innerText = "";
            } else {
                triggerFreeModeError();
            }
        }
        updateUI();
    });

    function resetGame() {
        stopTimer();
        isGameOver = false;
        document.body.classList.remove('error-state');
        document.getElementById('hiddenInput').disabled = false;
        document.getElementById('timer').innerText = "00:00.00";
        currentChunkIdx = 0; currentInput = ""; repeatsDone = 0;
        isReviewingAll = false; totalDigitsPassed = 0;
        document.getElementById('feedback').innerText = "";
        updateUI();
        document.getElementById('hiddenInput').focus();
    }

    async function toggleRecording() {
        const btn = document.getElementById('record-btn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: "video/webm" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = "PiMaster-Play.webm"; a.click();
                    btn.classList.remove('recording');
                };
                mediaRecorder.start();
                btn.classList.add('recording');
            } catch (err) {
                alert("Recording failed or not supported in this browser.");
            }
        } else {
            mediaRecorder.stop();
        }
    }

    document.body.addEventListener('click', (e) => {
        if (!isGameOver && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SVG') {
            document.getElementById('hiddenInput').focus();
        }
    });

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    const bgPiStr = "314159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193";
    const softColors = ['rgba(0, 150, 0, 0.4)', 'rgba(150, 0, 0, 0.4)', 'rgba(0, 100, 200, 0.4)'];
    const symbols = [];
    const fontSize = 14;
    const columns = Math.floor(canvas.width / (fontSize * 0.8));
    for (let i = 0; i < columns; i++) {
        symbols[i] = {
            y: Math.random() * canvas.height * -1,
            piIdx: Math.floor(Math.random() * bgPiStr.length),
            color: softColors[Math.floor(Math.random() * softColors.length)],
            speed: 1 + Math.random() * 2
        };
    }
    function drawBackground() {
        ctx.fillStyle = 'rgba(13, 13, 13, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px "Roboto Mono", monospace';
        ctx.shadowBlur = 4;
        for (let i = 0; i < symbols.length; i++) {
            let symbol = symbols[i];
            let text = bgPiStr[symbol.piIdx];
            ctx.shadowColor = symbol.color;
            ctx.fillStyle = symbol.color;
            const x = i * fontSize * 0.9;
            ctx.fillText(text, x, symbol.y);
            symbol.y += symbol.speed;
            symbol.piIdx = (symbol.piIdx + 1) % bgPiStr.length;
            if (symbol.y > canvas.height) {
                symbol.y = Math.random() * fontSize * -20;
                symbol.color = softColors[Math.floor(Math.random() * softColors.length)];
            }
        }
        requestAnimationFrame(drawBackground);
    }
    window.onload = function() {
        fetchPi();
        drawBackground();
    };
</script>
</body>
    </html>
